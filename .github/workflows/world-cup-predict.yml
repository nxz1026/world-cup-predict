name: World Cup Predict

on:
  schedule:
    - cron: '35 8 * * *'  # 16:35 BJT (08:35 UTC)
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Cleanup old predictions (retain 7 days)
        run: python3 scripts/predict_wc.py --cleanup

      - name: Run prediction
        run: python3 scripts/predict_wc.py > /tmp/predict_output.txt 2>/tmp/predict_stderr.txt || (cat /tmp/predict_stderr.txt && cat /tmp/predict_output.txt && exit 1)

      - name: Show stderr (debug)
        run: cat /tmp/predict_stderr.txt

      - name: Format email
        id: format
        shell: bash
        run: |
          python3 << 'PYEOF'
          import json, sys, os
          from datetime import datetime, timezone, timedelta

          output = open('/tmp/predict_output.txt').read().strip()
          if not output:
              print('ERROR: No JSON output')
              sys.exit(1)

          try:
              data = json.loads(output)
          except json.JSONDecodeError as e:
              print(f'JSON parse error: {e}')
              print(f'Output: {output[:500]}...')
              sys.exit(1)

          bjt = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M')
          lines_out = []
          lines_out.append(f'⚽ 世界杯预测 | {bjt}')
          lines_out.append('=' * 30)
          lines_out.append('')

          status = data.get('status', 'ok')
          if status == 'no_matches':
              lines_out.append('📌 未来 24h 无比赛，跳过预测')
              lines_out.append('')
              lines_out.append(f'数据窗口：{data.get("data_window", "")}。预测已跳过。')
          elif status == 'no_future_matches':
              cal = data.get('calibration', {})
              lines_out.append(f'📊 校准：{cal.get("total_matches",0)}场已结束')
              lines_out.append(f'   主胜 {cal.get("home_win_rate",0)*100:.0f}%  平 {cal.get("draw_rate",0)*100:.0f}%  客胜 {cal.get("away_win_rate",0)*100:.0f}%')
              if cal.get('odds_accuracy', 0) > 0:
                  lines_out.append(f'   热门正确率：{cal["odds_accuracy"]*100:.0f}%')
              lines_out.append('')
              lines_out.append('📌 未来 24h 内无待预测比赛')
          else:
              cal = data.get('calibration', {})
              if cal.get('total_matches', 0) > 0:
                  lines_out.append(f'📊 校准：{cal["total_matches"]}场 | 主胜 {cal.get("home_win_rate",0)*100:.0f}%  平 {cal.get("draw_rate",0)*100:.0f}%  客胜 {cal.get("away_win_rate",0)*100:.0f}%')
                  if cal.get('odds_accuracy', 0) > 0:
                      lines_out.append(f'   热门正确率：{cal["odds_accuracy"]*100:.0f}%')
                  lines_out.append('')

              preds = data.get('predictions', [])
              if not preds:
                  lines_out.append('📌 未来 24h 内无待预测比赛')
              else:
                  lines_out.append(f'🔥 待预测：{len(preds)} 场')
                  lines_out.append('')
                  for p in preds:
                      top3 = p.get('poisson_top3', [])[:3]
                      poisson_str = ' / '.join(f'{t["score"]}({t["prob"]*100:.0f}%)' for t in top3)
                      ci_home = p.get('lambda_home_ci95', (0, 0))
                      ci_away = p.get('lambda_away_ci95', (0, 0))
                      lines_out.append(f'🏟 {p["match"]}')
                      lines_out.append(f'   方向：{p["direction"]} {p["stars"]}')
                      if poisson_str:
                          lines_out.append(f'   比分：{poisson_str}')
                      lines_out.append(f'   xG：{lambda_home if (lambda_home := p.get("lambda_home",0)) else 0} [{ci_home[0]}-{ci_home[1]}] / {lambda_away if (lambda_away := p.get("lambda_away",0)) else 0} [{ci_away[0]}-{ci_away[1]}]')
                      lines_out.append(f'   {p.get("over_under","")} | BTTS {p.get("btts","")}')
                      lines_out.append('')

          # ── 回填结果（过去24h已结束比赛） ────────────
          pm = data.get('past_matches', [])
          if pm:
              lines_out.append('')
              lines_out.append(f'📋 回填：{len(pm)} 场')
              for m in pm:
                  display = m.get('name', f"{m.get('away','?')} vs {m.get('home','?')}")
                  sc = m.get('score', '?')
                  lines_out.append(f'   {display} → {sc}')

          # ── 累积校准信息 ────────────────────────────
          co = data.get('calibration_offset')
          if co:
              lines_out.append('')
              lines_out.append(f'🔧 累积校准(n={co["sample_size"]}): 主×{co["home_correction"]} 平×{co["draw_correction"]} 客×{co["away_correction"]}')
              lines_out.append(f'   实际分布: 主 {co["actual_home_rate"]} | 平 {co["actual_draw_rate"]} | 客 {co["actual_away_rate"]}')

          email_body = '\n'.join(lines_out)

          github_output = os.environ.get('GITHUB_OUTPUT', '/tmp/github_output.txt')
          with open(github_output, 'a') as f:
              day = datetime.now(timezone(timedelta(hours=8))).strftime('%m/%d')
              f.write(f'subject={day}\n')
              f.write(f'body<<EOF\n{email_body}\nEOF\n')

          print(email_body)
          PYEOF

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "⚽ 世界杯预测 ${{ steps.format.outputs.subject }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.SMTP_USER }}
          html_body: |
            <pre style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
            ${{ steps.format.outputs.body }}
            </pre>
