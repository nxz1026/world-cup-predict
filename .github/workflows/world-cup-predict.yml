name: World Cup Predict

on:
  schedule:
    - cron: '35 8 * * *'  # 16:35 BJT (08:35 UTC)
  workflow_dispatch:

jobs:
  predict:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install requests

      - name: Run prediction
        run: python3 scripts/predict_wc.py 2>&1 | tee /tmp/predict_output.txt

      - name: Format email
        id: format
        run: |
          python3 << 'PYEOF'
          import json, sys, os
          from datetime import datetime, timezone, timedelta

          # Read prediction output (may contain mixed JSON + log lines)
          output = open('/tmp/predict_output.txt').read().strip()
          
          if not output:
              print("ERROR: No output from prediction script")
              sys.exit(1)
          
          # Find the first { which starts the JSON object
          json_start = output.find('{')
          if json_start == -1:
              print("ERROR: No JSON object found in output")
              print(f"Output was: {output[:500]}...")
              sys.exit(1)
          
          json_str = output[json_start:]
          
          # Use raw_decode to parse only the first JSON object
          decoder = json.JSONDecoder()
          try:
              data, _ = decoder.raw_decode(json_str)
          except json.JSONDecodeError as e:
              print(f"JSON parse error: {e}")
              print(f"JSON was: {json_str[:500]}...")
              sys.exit(1)
          
          # Format email body
          bjt = datetime.now(timezone(timedelta(hours=8))).strftime('%Y-%m-%d %H:%M')
          lines_out = []
          lines_out.append(f"⚽ 世界杯预测 | {bjt}")
          lines_out.append("=" * 30)
          lines_out.append("")
          
          # Calibration
          cal = data.get('calibration', {})
          if cal.get('total_matches', 0) > 0:
              lines_out.append(f"📊 校准：{cal['total_matches']}场 | 主胜 {cal.get('home_win_rate',0)*100:.0f}% 平 {cal.get('draw_rate',0)*100:.0f}% 客胜 {cal.get('away_win_rate',0)*100:.0f}%")
              if cal.get('odds_accuracy', 0) > 0:
                  lines_out.append(f"   热门正确率：{cal['odds_accuracy']*100:.0f}%")
              lines_out.append("")
          
          # Predictions
          preds = data.get('predictions', [])
          if not preds:
              lines_out.append("📌 未来 24h 无待预测比赛")
          else:
              lines_out.append(f"🔥 待预测：{len(preds)} 场")
              lines_out.append("")
              for p in preds:
                  poisson_str = " / ".join(f"{t['score']}({t['prob']:.0%})" for t in p.get('poisson_top3', [])[:3])
                  lines_out.append(f"🏟 {p['match']}")
                  lines_out.append(f"   方向：{p['direction']} {p['stars']}")
                  lines_out.append(f"   比分：{poisson_str}")
                  lines_out.append(f"   λ：{p.get('lambda_home',0)}/{p.get('lambda_away',0)} | {p.get('over_under','')} | BTTS {p.get('btts','')}")
                  lines_out.append("")
          
          email_body = "\n".join(lines_out)
          
          # Write to file for debugging
          with open('/tmp/email_body.txt', 'w') as f:
              f.write(email_body)
          
          # Set outputs via GITHUB_OUTPUT
          github_output = os.environ.get('GITHUB_OUTPUT', '/dev/null')
          with open(github_output, 'a') as f:
              subject = f"⚽ 世界杯预测 {datetime.now(timezone(timedelta(hours=8))).strftime('%m/%d')}"
              f.write(f"subject={subject}\n")
              f.write(f"body<<EOF\n{email_body}\nEOF\n")
          
          print(f"Email body written ({len(email_body)} chars)")
          print(email_body)
          PYEOF

      - name: Send email
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: ${{ secrets.SMTP_HOST }}
          server_port: ${{ secrets.SMTP_PORT }}
          username: ${{ secrets.SMTP_USER }}
          password: ${{ secrets.SMTP_PASSWORD }}
          subject: "⚽ 世界杯预测 ${{ steps.format.outputs.subject }}"
          to: ${{ secrets.EMAIL_TO }}
          from: ${{ secrets.SMTP_USER }}
          html_body: |
            <pre style="font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; line-height: 1.6; color: #333; max-width: 600px; margin: 0 auto; padding: 20px;">
            ${{ steps.format.outputs.body }}
            </pre>
